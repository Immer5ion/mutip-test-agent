<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playwright Multi-Agent Console</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --panel: #ffffff;
      --text: #1d2939;
      --muted: #667085;
      --primary: #0f62fe;
      --primary-strong: #0043ce;
      --ok: #027a48;
      --bad: #b42318;
      --border: #d0d5dd;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, #dce8ff 0%, rgba(220, 232, 255, 0) 36%),
        radial-gradient(circle at 0% 90%, #e2f7ef 0%, rgba(226, 247, 239, 0) 28%),
        var(--bg);
      min-height: 100vh;
      padding: 24px;
    }
    .wrap {
      max-width: 1160px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      grid-template-columns: minmax(340px, 460px) 1fr;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 10px 28px rgba(16, 24, 40, 0.08);
      padding: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 760;
      letter-spacing: 0.3px;
    }
    h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }
    .desc {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }
    .row {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }
    .row.two {
      grid-template-columns: 1fr 1fr;
    }
    label {
      font-size: 12px;
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
    }
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 11px;
      font-size: 14px;
      color: var(--text);
      background: #fff;
    }
    textarea {
      resize: vertical;
      min-height: 96px;
    }
    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }
    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      background: var(--primary);
      transition: transform 100ms ease, background 160ms ease;
    }
    button:hover {
      background: var(--primary-strong);
      transform: translateY(-1px);
    }
    button.secondary {
      background: #475467;
    }
    button.secondary:hover {
      background: #344054;
    }
    button.ghost {
      background: #e4e7ec;
      color: #1d2939;
    }
    .meta {
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .state {
      margin-top: 8px;
      font-size: 14px;
      font-weight: 700;
    }
    .state.ok {
      color: var(--ok);
    }
    .state.bad {
      color: var(--bad);
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    pre {
      margin: 0;
      background: #101828;
      color: #d0d5dd;
      border-radius: 10px;
      min-height: 240px;
      padding: 12px;
      overflow: auto;
      font-size: 12px;
      line-height: 1.45;
    }
    iframe {
      width: 100%;
      min-height: 380px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }
    @media (max-width: 980px) {
      .wrap {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="panel">
      <h1>Multi-Agent 控制台</h1>
      <p class="desc">在页面直接调用 Orchestrator API：创建任务、轮询状态、查看报告。</p>

      <div class="row">
        <div>
          <label for="requirement">需求描述</label>
          <textarea id="requirement">访问 https://example.com 并验证 Example Domain 文本可见</textarea>
        </div>
      </div>

      <div class="row two">
        <div>
          <label for="targetUrl">目标 URL</label>
          <input id="targetUrl" type="url" value="https://example.com" />
        </div>
        <div>
          <label for="retryBudget">重试预算</label>
          <input id="retryBudget" type="number" min="0" max="10" value="3" />
        </div>
      </div>

      <div class="row">
        <div>
          <label for="runId">Run ID</label>
          <input id="runId" type="text" placeholder="创建任务后自动填入，或手动输入" />
        </div>
      </div>

      <div class="btns">
        <button id="createBtn">创建并启动</button>
        <button class="secondary" id="statusBtn">查询状态</button>
        <button class="ghost" id="pollBtn">开始自动轮询</button>
        <button class="secondary" id="reportJsonBtn">加载 JSON 报告</button>
        <button class="secondary" id="reportHtmlBtn">加载 HTML 报告</button>
      </div>

      <div class="meta" id="metaText">等待操作</div>
      <div class="state" id="stateText">状态：N/A</div>
    </section>

    <section class="grid">
      <div class="panel">
        <h2>JSON 输出</h2>
        <pre id="jsonOutput">{}</pre>
      </div>
      <div class="panel">
        <h2>HTML 报告预览</h2>
        <iframe id="reportFrame" title="HTML Report Preview"></iframe>
      </div>
    </section>
  </div>

  <script>
    const requirementEl = document.getElementById("requirement");
    const targetUrlEl = document.getElementById("targetUrl");
    const retryBudgetEl = document.getElementById("retryBudget");
    const runIdEl = document.getElementById("runId");
    const jsonOutputEl = document.getElementById("jsonOutput");
    const reportFrameEl = document.getElementById("reportFrame");
    const metaTextEl = document.getElementById("metaText");
    const stateTextEl = document.getElementById("stateText");
    const pollBtnEl = document.getElementById("pollBtn");

    let pollTimer = null;

    function setMeta(text) {
      metaTextEl.textContent = text;
    }

    function setState(status, error) {
      stateTextEl.classList.remove("ok", "bad");
      stateTextEl.textContent = `状态：${status || "N/A"}`;
      if (status === "completed") {
        stateTextEl.classList.add("ok");
      }
      if (status === "failed") {
        stateTextEl.classList.add("bad");
      }
      if (error) {
        stateTextEl.textContent = `${stateTextEl.textContent} | 错误：${error}`;
      }
    }

    function setJson(obj) {
      jsonOutputEl.textContent = JSON.stringify(obj, null, 2);
    }

    async function createRun() {
      const body = {
        requirement: requirementEl.value.trim(),
        targetUrl: targetUrlEl.value.trim() || undefined,
        retryBudget: Number.parseInt(retryBudgetEl.value, 10)
      };

      setMeta("正在创建任务...");
      const response = await fetch("/v1/test-runs", {
        method: "POST",
        headers: {
          "content-type": "application/json"
        },
        body: JSON.stringify(body)
      });
      const payload = await response.json();
      if (!response.ok) {
        setJson(payload);
        setMeta("创建失败");
        return;
      }

      runIdEl.value = payload.run.id;
      setJson(payload);
      setState(payload.run.status);
      setMeta(`任务已创建：${payload.run.id}`);
    }

    async function fetchStatus() {
      const runId = runIdEl.value.trim();
      if (!runId) {
        setMeta("请先输入 runId");
        return;
      }

      setMeta("正在查询状态...");
      const response = await fetch(`/v1/test-runs/${encodeURIComponent(runId)}`);
      const payload = await response.json();
      setJson(payload);

      if (!response.ok) {
        setMeta("查询失败");
        setState("N/A", payload.error || "未知错误");
        return;
      }

      setState(payload.run.status, payload.run.lastError || "");
      setMeta(`最近更新时间：${payload.run.updatedAt}`);
    }

    async function fetchReportJson() {
      const runId = runIdEl.value.trim();
      if (!runId) {
        setMeta("请先输入 runId");
        return;
      }
      setMeta("正在加载 JSON 报告...");
      const response = await fetch(`/v1/test-runs/${encodeURIComponent(runId)}/report`);
      const payload = await response.json();
      setJson(payload);
      setMeta(response.ok ? "JSON 报告已加载" : "JSON 报告加载失败");
    }

    function loadReportHtml() {
      const runId = runIdEl.value.trim();
      if (!runId) {
        setMeta("请先输入 runId");
        return;
      }
      reportFrameEl.src = `/v1/test-runs/${encodeURIComponent(runId)}/report?format=html`;
      setMeta("HTML 报告已加载到右侧预览");
    }

    function togglePoll() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
        pollBtnEl.textContent = "开始自动轮询";
        setMeta("自动轮询已停止");
        return;
      }
      pollTimer = setInterval(() => {
        void fetchStatus();
      }, 2000);
      pollBtnEl.textContent = "停止自动轮询";
      setMeta("自动轮询中（每 2 秒）");
      void fetchStatus();
    }

    document.getElementById("createBtn").addEventListener("click", () => {
      void createRun();
    });
    document.getElementById("statusBtn").addEventListener("click", () => {
      void fetchStatus();
    });
    document.getElementById("pollBtn").addEventListener("click", togglePoll);
    document.getElementById("reportJsonBtn").addEventListener("click", () => {
      void fetchReportJson();
    });
    document.getElementById("reportHtmlBtn").addEventListener("click", loadReportHtml);
  </script>
</body>
</html>
